<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>EcoBite | Panel</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #fcfbf7; padding: 40px; color: #3d3122; }
        .container { max-width: 800px; margin: auto; }
        
        /* Kartlar İçin Stil */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 30px; }
        .card { background: white; padding: 25px; border-radius: 15px; border-left: 8px solid #4A6741; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        
        h1 { color: #4A6741; text-align: center; }
        .btn-exit { display: block; width: 200px; margin: 40px auto; padding: 12px; background: #d2b48c; color: white; text-align: center; text-decoration: none; border-radius: 10px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h1>EcoBite Yönetim Paneli</h1>
        
        <div id="roleContent" class="stats-grid">
            <!-- İçerik buraya dinamik gelecek -->
        </div>
        
        <a href="index.html" class="btn-exit" onclick="localStorage.clear()">Çıkış Yap</a>
    </div>

    <script>
        const role = localStorage.getItem("userRole");
        const content = document.getElementById("roleContent");

        if (role === "student") {
            content.innerHTML = `
                <div class="card"><h3>İsrafı Önleme</h3><p>Bugün 3 porsiyon gıdayı kurtardın. Harikasın!</p></div>
                <div class="card"><h3>Puan Durumu</h3><p>Toplam Eco-Puanın: 145</p></div>
            `;
        } else if (role === "staff") {
            content.innerHTML = `
                <div class="card"><h3>Stok Raporu</h3><p>Mevcut stok durumu: %85 verimlilik.</p></div>
                <div class="card"><h3>Atık Analizi</h3><p>Bu hafta atıklar %12 oranında azaldı.</p></div>
            `;
        }
    </script>
</body>
</html>
