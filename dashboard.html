<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>EcoBite | Detaylı Seçim</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #fffdf5; padding: 20px; color: #2d3436; }
        .card { background: white; max-width: 500px; margin: 0 auto; padding: 30px; border-radius: 20px; border: 2px solid #5a8e45; }
        .item-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #eee; }
        .allergen-tag { background: #f1c40f; padding: 2px 5px; border-radius: 4px; font-size: 0.7em; margin-left: 5px; }
        .btn-confirm { width: 100%; padding: 15px; background: #5a8e45; color: white; border: none; border-radius: 10px; cursor: pointer; margin-top: 20px; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <h2 style="color: #3d5e2f;">🥗 Bugünün Menüsü (Özelleştir)</h2>
    
    <div id="menu-items">
        <div class="item-row">
            <span>🥣 Mercimek Çorbası <span class="allergen-tag">Gluten</span></span>
            <input type="checkbox" checked>
        </div>
        <div class="item-row">
            <span>🍗 Izgara Tavuk (Porsiyon Seç)</span>
            <select id="tavuk-porsiyon">
                <option value="Yok">İstemiyorum</option>
                <option value="Yarım">Yarım</option>
                <option value="Tam">Tam</option>
            </select>
        </div>
        <div class="item-row">
            <span>🍞 Ekmek <span class="allergen-tag">Gluten</span></span>
            <input type="checkbox" checked>
        </div>
        <div class="item-row">
            <span>🍮 Sütlaç <span class="allergen-tag">Süt</span></span>
            <input type="checkbox" checked>
        </div>
    </div>

    <button class="btn-confirm" onclick="generateQR()">QR Kodumu Oluştur</button>
    
    <div id="qr-result" style="display:none; text-align:center; margin-top:20px; border:2px dashed #5a8e45; padding:15px;">
        <h3>QR Kodunuz Hazır!</h3>
        <p style="font-family:monospace; font-size: 1.5em; color: #5a8e45;">EB-2026-X99</p>
    </div>
</div>

<script>
    function generateQR() {
        // Seçimleri al ve kaydet
        const tavuk = document.getElementById('tavuk-porsiyon').value;
        localStorage.setItem('menuSelection', 'Tavuk: ' + tavuk);
        
        document.getElementById('qr-result').style.display = 'block';
        alert("Seçimleriniz kaydedildi ve QR kodunuz oluşturuldu!");
    }
</script>

</body>
</html>
