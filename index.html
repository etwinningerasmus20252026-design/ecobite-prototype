<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>EcoBite | Sürdürülebilir Gelecek</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #fffdf5; margin: 0; color: #2d3436; 
               background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="80" height="80" viewBox="0 0 100 100"><path d="M25,50 C15,40 10,25 25,10 C40,25 35,40 25,50 Z M75,50 C65,40 60,25 75,10 C90,25 85,40 75,50 Z M50,85 C40,75 35,60 50,45 C65,60 60,75 50,85 Z" fill="%235a8e45" fill-opacity="0.05"/></svg>'); }
        
        /* Gelişmiş Başlık Alanı */
        .hero { 
            background: linear-gradient(150deg, #3d5e2f 0%, #5a8e45 100%); 
            color: white; padding: 100px 20px; text-align: center; position: relative;
        }
        .hero-shape { position: absolute; right: 10%; top: 20%; width: 150px; opacity: 0.2; animation: float 4s infinite ease-in-out; }
        
        @keyframes float { 0% { transform: translateY(0px); } 50% { transform: translateY(-20px); } 100% { transform: translateY(0px); } }

        .stats-container { display: flex; justify-content: center; gap: 20px; padding: 40px; }
        .stat-card { background: white; padding: 25px; border-radius: 20px; border-bottom: 6px solid #f1c40f; box-shadow: 0 10px 30px rgba(0,0,0,0.05); text-align: center; width: 180px; }
        
        /* Proje Özeti Kutusu (Yeni) */
        .feature-box { max-width: 600px; margin: 20px auto; display: flex; gap: 20px; justify-content: center; }
        .feat { background: #fff; padding: 15px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); font-size: 0.9em; border-left: 3px solid #5a8e45; }
        
        .tip-box { max-width: 600px; margin: 30px auto; padding: 25px; background: #e8f5e9; border-radius: 15px; text-align: center; border: 2px dashed #5a8e45; }
        
        .login-section { max-width: 400px; margin: 30px auto; padding: 40px; background: linear-gradient(to bottom, #ffffff, #f9f9f9); border: 2px solid #5a8e45; border-radius: 30px; box-shadow: 0 20px 50px rgba(0,0,0,0.1); }
        
        button { width: 100%; padding: 15px; background: #5a8e45; color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #f1c40f; color: #3d5e2f; transform: scale(1.05); }
    </style>
</head>
<body>
    <div class="hero">
        <div class="hero-shape">🌿</div>
        <h1>EcoBite</h1>
        <p>Gıda israfını teknolojiyle durduruyoruz, geleceği birlikte tasarlıyoruz.</p>
    </div>

    <div class="feature-box">
        <div class="feat">🚀 Hızlı Stok Analizi</div>
        <div class="feat">♻️ %0 Atık Hedefi</div>
    </div>

    <div class="stats-container">
        <div class="stat-card"><strong>1.200+</strong><br>Kurtarılan Yemek</div>
        <div class="stat-card"><strong>450+</strong><br>Aktif Katılımcı</div>
        <div class="stat-card"><strong>20+</strong><br>İş Birliği</div>
    </div>

    <div class="tip-box" id="dynamicTip"></div>

    <div class="login-section">
        <h2>Panele Giriş</h2>
        <input type="text" id="idInput" placeholder="Kullanıcı No" style="width:100%; padding:12px; border:1px solid #ccc; border-radius:8px;">
        <input type="password" id="passwordInput" placeholder="Şifre" style="width:100%; padding:12px; border:1px solid #ccc; border-radius:8px; margin-top:10px;">
        <button onclick="login()" style="margin-top:20px;">Giriş Yap</button>
    </div>

    <script>
        const tips = [
            "<strong>Vizyon:</strong> Sürdürülebilir atık yönetimi ile atıkları değer zincirine geri kazandırıyoruz.",
            "<strong>Bilgi:</strong> Gıda israfı, küresel sera gazı emisyonlarının yaklaşık %8'inden sorumludur.",
            "<strong>Hedef:</strong> Akıllı veri analizleri ile stok yönetimi optimizasyonu sağlıyoruz.",
            "<strong>Döngüsel Ekonomi:</strong> Kaynakların verimli kullanımı, yarının dünyası için kritik öneme sahip.",
            "<strong>İnovasyon:</strong> Teknolojik çözümlerle çevre dostu bir kampüs yaşamı mümkün."
        ];
        document.getElementById("dynamicTip").innerHTML = tips[Math.floor(Math.random() * tips.length)];
    </script>
</body>
</html>
