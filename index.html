<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>EcoBite | Sürdürülebilir Gelecek</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #fffdf5; margin: 0; color: #2d3436; }
        
        /* Hero Alanı: Canlı Yeşil */
        .hero { background: #5a8e45; color: white; padding: 50px 20px; text-align: center; }
        
        /* Stats Alanı: Hardal Sarısı (Vurgu) */
        .stats { display: flex; justify-content: center; gap: 60px; padding: 25px; background: #f1c40f; color: #2d3436; font-weight: bold; }
        
        /* İçerik Bölümü */
        .info-section { max-width: 600px; margin: 30px auto; padding: 20px; text-align: center; }
        
        /* Giriş Paneli */
        .login-section { max-width: 400px; margin: 20px auto; padding: 30px; background: white; border: 3px solid #5a8e45; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        
        h2 { color: #5a8e45; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 2px solid #f1c40f; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #5a8e45; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        button:hover { background: #456b35; }
    </style>
</head>
<body>
    <div class="hero">
        <h1>EcoBite</h1>
        <p>Gıda israfına karşı teknolojik ve sürdürülebilir çözümler.</p>
    </div>

    <div class="stats">
        <div>1.200+ Kurtarılan Yemek</div>
        <div>450+ Aktif Katılımcı</div>
    </div>

    <div class="info-section">
        <h3>Neden EcoBite?</h3>
        <p>Gıda atıklarını minimize ederek, kaynaklarımızı daha verimli kullanıyoruz. Sen de bu dönüşümün bir parçası ol!</p>
    </div>

    <div class="login-section">
        <h2>Panele Giriş</h2>
        <input type="text" id="idInput" placeholder="Kullanıcı No">
        <input type="password" id="passwordInput" placeholder="Şifre">
        <button onclick="login()">Giriş Yap</button>
    </div>

    <script src="assets/js/auth.js"></script>
</body>
</html>
