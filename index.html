<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>EcoBite | Giriş</title>
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background-color: #fcfbf7; 
            display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; 
        }
        .login-card { 
            background: #ffffff; padding: 40px; border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 350px;
            border: 1px solid #d2b48c; 
        }
        h2 { color: #4A6741; text-align: center; margin-bottom: 25px; } 
        input { 
            width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #d2b48c; 
            border-radius: 8px; box-sizing: border-box; outline-color: #4A6741;
        }
        button { 
            width: 100%; padding: 12px; background: #4A6741; color: white; 
            border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 10px;
            transition: background 0.3s;
        }
        button:hover { background: #3a5434; }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>EcoBite Giriş</h2>
        <input type="text" id="idInput" placeholder="Kullanıcı No">
        <input type="password" id="passwordInput" placeholder="Şifre">
        <button onclick="login()">Giriş Yap</button>
    </div>
    <script src="assets/js/auth.js"></script>
</body>
</html>
